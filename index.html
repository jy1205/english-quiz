<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语学习 - 测验中心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 720px;
  width: 100%;
  text-align: center;
}

.header {
  margin-bottom: 50px;
}

.logo {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 40px;
  box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
}

.header h1 {
  color: #fff;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 2px;
}

.header p {
  color: rgba(255,255,255,0.6);
  font-size: 15px;
  margin-top: 8px;
}

.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

@media (max-width: 560px) {
  .cards { grid-template-columns: 1fr; }
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 36px 28px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: block;
  text-align: center;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(102,126,234,0.5);
  box-shadow: 0 20px 50px rgba(102,126,234,0.15);
}

.card-icon {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
  font-size: 30px;
}

.card-word .card-icon { background: linear-gradient(135deg, #f093fb, #f5576c); }
.card-tense .card-icon { background: linear-gradient(135deg, #4facfe, #00f2fe); }

.card h2 {
  color: #fff;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}

.card p {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  line-height: 1.6;
}

.card .tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 14px;
}

.tag {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.75);
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
}

.divider {
  display: flex;
  align-items: center;
  color: rgba(255,255,255,0.3);
  margin: 30px 0;
  font-size: 12px;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.1);
}

.divider span { padding: 0 16px; }

.records-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

.records-link:hover {
  color: #fff;
  border-color: rgba(255,255,255,0.25);
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">📚</div>
    <h1>English Quiz Center</h1>
    <p>选择你要练习的测验类型</p>
  </div>

  <div class="cards">
    <a class="card card-word" href="./word-quiz/index.html">
      <div class="card-icon">📝</div>
      <h2>单词背诵测验</h2>
      <p>AI 生成单词题 · 英译中 & 中译英<br>涵盖初二至初三核心词汇</p>
      <div class="tag-row">
        <span class="tag">英译中</span>
        <span class="tag">中译英</span>
        <span class="tag">拼写练习</span>
        <span class="tag">自动判卷</span>
      </div>
    </a>

    <a class="card card-tense" href="./tense-quiz/tense-quiz.html">
      <div class="card-icon">⏳</div>
      <h2>动词时态练习</h2>
      <p>9 种核心时态 · 填空题测验<br>含时态讲解弹窗 & 易错追踪</p>
      <div class="tag-row">
        <span class="tag">9种时态</span>
        <span class="tag">填空练习</span>
        <span class="tag">错题讲解</span>
        <span class="tag">记录追踪</span>
      </div>
    </a>
  </div>

  <div class="divider"><span>你的学习记录保留在浏览器本地</span></div>
</div>

</body>
</html>
